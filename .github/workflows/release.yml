name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Run tests
        run: go test ./...

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          make dist

          mkdir -p dist/release
          for target in linux-mipsle linux-mips linux-arm64; do
            bundle_dir="dist/bundle/${target}"
            mkdir -p "${bundle_dir}"
            cp "dist/${target}/xkeen-ui" "${bundle_dir}/xkeen-ui"
            cp "scripts/S26xkeen-ui" "${bundle_dir}/S26xkeen-ui"
            cp "config/config.example.yaml" "${bundle_dir}/config.example.yaml"
            tar -czf "dist/release/xkeen-ui-${target}.tar.gz" -C "${bundle_dir}" .
          done

          sha256sum dist/release/* > dist/release/SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/xkeen-ui-linux-mipsle.tar.gz
            dist/release/xkeen-ui-linux-mips.tar.gz
            dist/release/xkeen-ui-linux-arm64.tar.gz
            dist/release/SHA256SUMS.txt
          generate_release_notes: true
